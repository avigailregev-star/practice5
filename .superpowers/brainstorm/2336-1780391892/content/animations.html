<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0a0a0a; font-family: 'Rubik', sans-serif; padding: 30px 20px; direction: rtl; }
h2 { color: #fff; font-size: 20px; font-weight: 700; text-align: center; margin-bottom: 6px; }
p.sub { color: #555; font-size: 13px; text-align: center; margin-bottom: 28px; }

.grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; max-width: 900px; margin: 0 auto; }
.option-wrap { display: flex; flex-direction: column; gap: 10px; }
.opt-label { color: #888; font-size: 11px; text-align: center; letter-spacing: 1px; }

.preview {
  height: 240px;
  border-radius: 20px;
  border: 1px solid #222;
  position: relative;
  overflow: hidden;
  cursor: pointer;
  transition: border-color 0.2s;
}
.preview:hover { border-color: #c9a84c; }
.preview.selected { border-color: #c9a84c; box-shadow: 0 0 0 2px rgba(201,168,76,0.3); }

/* Fake phone content overlay */
.phone-ui {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 16px;
  background: linear-gradient(to top, rgba(10,10,10,0.95) 60%, transparent);
  z-index: 10;
}
.ui-name { color: #fff; font-size: 18px; font-weight: 800; margin-bottom: 2px; }
.ui-sub { color: #c9a84c; font-size: 10px; letter-spacing: 1px; }

/* ── OPTION A: Floating particles ── */
.particles-bg { background: #0f0f0f; width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
.particle {
  position: absolute;
  border-radius: 50%;
  background: #c9a84c;
  opacity: 0;
  animation: float-up linear infinite;
}
@keyframes float-up {
  0%   { opacity: 0; transform: translateY(0) scale(0); }
  10%  { opacity: 0.6; }
  90%  { opacity: 0.15; }
  100% { opacity: 0; transform: translateY(-220px) scale(1); }
}
.p1 { width:3px; height:3px; bottom:10px; left:20%; animation-duration:4s; animation-delay:0s; }
.p2 { width:2px; height:2px; bottom:20px; left:45%; animation-duration:5s; animation-delay:1s; }
.p3 { width:4px; height:4px; bottom:5px;  left:70%; animation-duration:3.5s; animation-delay:0.5s; }
.p4 { width:2px; height:2px; bottom:15px; left:30%; animation-duration:6s; animation-delay:2s; }
.p5 { width:3px; height:3px; bottom:8px;  left:60%; animation-duration:4.5s; animation-delay:1.5s; }
.p6 { width:2px; height:2px; bottom:25px; left:80%; animation-duration:5.5s; animation-delay:0.8s; }
.p7 { width:3px; height:3px; bottom:12px; left:10%; animation-duration:3.8s; animation-delay:2.5s; }
.p8 { width:2px; height:2px; bottom:18px; left:90%; animation-duration:4.2s; animation-delay:3s; }

/* ── OPTION B: Glowing orbs / mesh gradient ── */
.orbs-bg { background: #0f0f0f; width: 100%; height: 100%; position: absolute; }
.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(40px);
  animation: drift ease-in-out infinite alternate;
}
@keyframes drift {
  from { transform: translate(0, 0); }
  to   { transform: translate(15px, -20px); }
}
.orb1 { width:120px; height:120px; background:rgba(201,168,76,0.15); top:-20px; right:-20px; animation-duration:6s; }
.orb2 { width:80px;  height:80px;  background:rgba(201,168,76,0.08); bottom:20px; left:10px; animation-duration:8s; animation-delay:2s; }
.orb3 { width:60px;  height:60px;  background:rgba(201,168,76,0.06); top:50%; left:50%; animation-duration:5s; animation-delay:1s; }

/* ── OPTION C: Music wave ── */
.wave-bg { background: #0f0f0f; width: 100%; height: 100%; position: absolute; display: flex; align-items: flex-end; padding-bottom: 60px; }
.wave-container { display: flex; align-items: flex-end; gap: 3px; padding: 0 20px; opacity: 0.2; }
.bar {
  width: 3px;
  background: linear-gradient(to top, #c9a84c, transparent);
  border-radius: 2px;
  animation: wave-bar ease-in-out infinite alternate;
}
@keyframes wave-bar {
  from { height: 4px; }
  to   { height: var(--h); }
}
.b1  { --h: 30px; animation-duration: 0.8s; }
.b2  { --h: 50px; animation-duration: 1.1s; animation-delay: 0.1s; }
.b3  { --h: 25px; animation-duration: 0.7s; animation-delay: 0.2s; }
.b4  { --h: 65px; animation-duration: 1.3s; animation-delay: 0.05s; }
.b5  { --h: 40px; animation-duration: 0.9s; animation-delay: 0.3s; }
.b6  { --h: 55px; animation-duration: 1.0s; animation-delay: 0.15s; }
.b7  { --h: 20px; animation-duration: 0.6s; animation-delay: 0.25s; }
.b8  { --h: 70px; animation-duration: 1.4s; animation-delay: 0.4s; }
.b9  { --h: 35px; animation-duration: 0.85s; animation-delay: 0.1s; }
.b10 { --h: 45px; animation-duration: 1.2s; animation-delay: 0.35s; }
.b11 { --h: 28px; animation-duration: 0.75s; animation-delay: 0.2s; }
.b12 { --h: 60px; animation-duration: 1.1s; animation-delay: 0.05s; }
.b13 { --h: 38px; animation-duration: 0.95s; animation-delay: 0.3s; }
.b14 { --h: 52px; animation-duration: 1.05s; animation-delay: 0.45s; }
.b15 { --h: 22px; animation-duration: 0.65s; animation-delay: 0.15s; }
.b16 { --h: 48px; animation-duration: 1.15s; animation-delay: 0.0s; }
.b17 { --h: 33px; animation-duration: 0.88s; animation-delay: 0.25s; }
.b18 { --h: 58px; animation-duration: 1.25s; animation-delay: 0.1s; }
.b19 { --h: 42px; animation-duration: 0.92s; animation-delay: 0.35s; }
.b20 { --h: 26px; animation-duration: 0.72s; animation-delay: 0.2s; }

.select-btn {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #333;
  background: #1a1a1a;
  color: #888;
  font-family: 'Rubik', sans-serif;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.select-btn:hover { border-color: #c9a84c; color: #c9a84c; }
</style>
</head>
<body>

<h2>אנימציות רקע</h2>
<p class="sub">לחצי על האפשרות שמרגישה נכון</p>

<div class="grid">

  <!-- A: Particles -->
  <div class="option-wrap">
    <div class="preview" onclick="select(this,'a')">
      <div class="particles-bg">
        <div class="particle p1"></div>
        <div class="particle p2"></div>
        <div class="particle p3"></div>
        <div class="particle p4"></div>
        <div class="particle p5"></div>
        <div class="particle p6"></div>
        <div class="particle p7"></div>
        <div class="particle p8"></div>
      </div>
      <div class="phone-ui">
        <div class="ui-name">שלום, עדי</div>
        <div class="ui-sub">רמה 3 · קריאת תווים</div>
      </div>
    </div>
    <button class="select-btn" onclick="select(document.querySelector('[data-val=a]'),'a')">A — חלקיקי זהב עולים</button>
    <div style="color:#555;font-size:11px;text-align:center;line-height:1.5">נקודות זהב קטנות שעולות לאט. עדין ומרגיע.</div>
  </div>

  <!-- B: Glowing orbs -->
  <div class="option-wrap">
    <div class="preview" onclick="select(this,'b')">
      <div class="orbs-bg">
        <div class="orb orb1"></div>
        <div class="orb orb2"></div>
        <div class="orb orb3"></div>
      </div>
      <div class="phone-ui">
        <div class="ui-name">שלום, עדי</div>
        <div class="ui-sub">רמה 3 · קריאת תווים</div>
      </div>
    </div>
    <button class="select-btn" onclick="select(document.querySelector('[data-val=b]'),'b')">B — זוהר זהב רך</button>
    <div style="color:#555;font-size:11px;text-align:center;line-height:1.5">כתמי אור מטושטשים שזזים לאט. מרגיש פרימיום.</div>
  </div>

  <!-- C: Wave -->
  <div class="option-wrap">
    <div class="preview" onclick="select(this,'c')">
      <div class="wave-bg">
        <div class="wave-container">
          <div class="bar b1"></div><div class="bar b2"></div><div class="bar b3"></div>
          <div class="bar b4"></div><div class="bar b5"></div><div class="bar b6"></div>
          <div class="bar b7"></div><div class="bar b8"></div><div class="bar b9"></div>
          <div class="bar b10"></div><div class="bar b11"></div><div class="bar b12"></div>
          <div class="bar b13"></div><div class="bar b14"></div><div class="bar b15"></div>
          <div class="bar b16"></div><div class="bar b17"></div><div class="bar b18"></div>
          <div class="bar b19"></div><div class="bar b20"></div>
        </div>
      </div>
      <div class="phone-ui">
        <div class="ui-name">שלום, עדי</div>
        <div class="ui-sub">רמה 3 · קריאת תווים</div>
      </div>
    </div>
    <button class="select-btn">C — גלי מוזיקה</button>
    <div style="color:#555;font-size:11px;text-align:center;line-height:1.5">אקולייזר בתחתית המסך. הכי מוסיקלי.</div>
  </div>

</div>

<script>
function select(el, val) {
  document.querySelectorAll('.preview').forEach(p => p.classList.remove('selected'));
  if (el && el.classList) el.classList.add('selected');
}
</script>
</body>
</html>
